# CB8 single-container deployment.
#
# SQLite is the source of truth, so this service cannot scale horizontally.
# Build the image with `docker compose build` (build context is the repo root)
# or pull a pre-built one by setting CB8_IMAGE.
#
# Host paths default to /srv/cb8/data, /mnt/raid6/comics, /mnt/raid6/ebooks
# to mirror the k8s manifest. Override via env or a .env file in this dir.
#
# After the container is up, sign in as admin and add /comics and /ebooks
# as library paths from the web UI.

services:
  cb8:
    image: ${CB8_IMAGE:-cb8:latest}
    build:
      context: ../..
      dockerfile: packaging/docker/Dockerfile
    container_name: cb8
    restart: unless-stopped
    user: "10001:10001"
    ports:
      - "${CB8_PUBLISH_PORT:-4218}:8008"
    environment:
      CB8_DATA_DIR: /var/lib/cb8
      CB8_PORT: "8008"
      CB8_HOST: 0.0.0.0
      CB8_INGEST_CONCURRENCY: ${CB8_INGEST_CONCURRENCY:-4}
      CB8_ARCHIVE_LIST_TIMEOUT_MS: ${CB8_ARCHIVE_LIST_TIMEOUT_MS:-60000}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-}
      BETTER_AUTH_TRUSTED_ORIGINS: ${BETTER_AUTH_TRUSTED_ORIGINS:-}
    volumes:
      - ${CB8_DATA_PATH:-/srv/cb8/data}:/var/lib/cb8
      - ${CB8_COMICS_PATH:-/mnt/raid6/comics}:/comics
      - ${CB8_EBOOKS_PATH:-/mnt/raid6/ebooks}:/ebooks
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8008/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 5
